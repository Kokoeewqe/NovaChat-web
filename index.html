<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>


<body>


<!-- АВТОРИЗАЦИЯ -->

<div id="auth" class="auth-box">


    <h1>
        🚀 NovaChat
    </h1>


    <div class="tabs">

        <button onclick="showLogin()">
            Вход
        </button>


        <button onclick="showRegister()">
            Регистрация
        </button>

    </div>



    <div id="login-form">


        <input 
        id="login-email"
        placeholder="Email">


        <input 
        id="login-password"
        type="password"
        placeholder="Пароль">


        <button onclick="login()">
            Войти
        </button>


    </div>




    <div id="register-form" style="display:none;">


        <input 
        id="reg-name"
        placeholder="Имя">


        <input 
        id="reg-email"
        placeholder="Email">


        <input 
        id="reg-password"
        type="password"
        placeholder="Пароль">


        <button onclick="register()">
            Создать аккаунт
        </button>


    </div>


</div>





<!-- ЧАТ -->


<div id="chat-app" style="display:none;">



<aside class="sidebar">


<div class="logo">
🚀 NovaChat
</div>



<div class="profile">


<div class="avatar">
👤
</div>


<div>

<h3 id="current-user">
</h3>


<span>
🟢 онлайн
</span>


</div>


</div>




<button onclick="logout()">

Выйти

</button>



</aside>





<main class="chat">


<header class="chat-header">

<h2>
Общий чат
</h2>


<span>
NovaChat v2
</span>

</header>




<div id="messages" class="messages">

</div>





<div class="input-box">


<input 
id="message-text"
placeholder="Напишите сообщение...">



<button onclick="sendMessage()">

➤

</button>


</div>



</main>



</div>





<script src="app.js"></script>


</body>

</html>
