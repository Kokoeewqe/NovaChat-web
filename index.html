<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat</title>

<link rel="stylesheet" href="style.css">


<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>


<body>


<!-- AUTH -->

<div class="auth-box" id="auth">


<h1>🚀 NovaChat</h1>


<div id="login-form">


<h2>Вход</h2>


<input 
id="login-email"
placeholder="Email"
>


<input 
id="login-password"
type="password"
placeholder="Пароль"
>


<button onclick="login()">
Войти
</button>


<button class="second"
onclick="showRegister()">
Создать аккаунт
</button>


</div>





<div id="register-form" style="display:none">


<h2>Регистрация</h2>


<input
id="reg-name"
placeholder="Имя"
>


<input
id="reg-email"
placeholder="Email"
>


<input
id="reg-password"
type="password"
placeholder="Пароль"
>


<button onclick="register()">
Создать
</button>


<button class="second"
onclick="showLogin()">
Назад
</button>


</div>


</div>








<!-- CHAT -->


<div id="chat-app">


<aside class="sidebar">


<div class="logo">
🚀 NovaChat
</div>



<div class="profile">


<div class="avatar">
👤
</div>


<div>

<b id="current-user">
User
</b>

<br>

<span>
online
</span>

</div>


</div>



<h3>
Пользователи
</h3>


<div id="users-list">

</div>


</aside>







<section class="chat">


<div class="chat-header">


<h2>
Общий чат
</h2>


<span>
🟢 online
</span>


</div>





<div id="messages"
class="messages">

</div>





<div class="input-area">


<input
id="message-text"
placeholder="Сообщение..."
>


<button onclick="sendMessage()">
➤
</button>


</div>


</section>


</div>







<script src="app.js"></script>


</body>

</html>
