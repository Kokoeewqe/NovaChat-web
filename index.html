<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NovaChat</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>


<body>


<div class="app">


    <!-- Левая панель -->

    <aside class="sidebar">

        <div class="logo">
            🚀 NovaChat
        </div>


        <div class="profile">

            <div class="avatar">
                👤
            </div>

            <div>
                <h3 id="username">
                    Гость
                </h3>

                <span>
                    🟢 онлайн
                </span>
            </div>

        </div>


        <div class="users-title">
            Пользователи
        </div>


        <div class="users">

            <div class="user">
                👤 Иван
            </div>


            <div class="user">
                👤 Анна
            </div>

        </div>


    </aside>



    <!-- Чат -->


    <main class="chat">


        <header class="chat-header">

            <h2>
                Общий чат
            </h2>

            <span>
                🔥 NovaChat
            </span>

        </header>



        <div id="messages" class="messages">


        </div>




        <div class="input-box">


            <input 
                id="name"
                placeholder="Ваше имя"
            >



            <input 
                id="text"
                placeholder="Напишите сообщение..."
            >



            <button onclick="send()">

                ➤

            </button>


        </div>



    </main>



</div>



<script src="app.js"></script>


</body>

</html>
