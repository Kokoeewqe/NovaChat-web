<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat</title>


<link rel="stylesheet" href="style.css">


<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


</head>


<body>



<!-- =====================
AUTH
===================== -->


<div id="auth" class="auth-box">


<h1>🚀 NovaChat</h1>



<div id="login-form">


<h2>Вход</h2>


<input 
id="login-email"
placeholder="Email"
>


<input 
id="login-password"
type="password"
placeholder="Пароль"
>


button onclick="login()">
Войти
</button>


<br><br>


<button onclick="showRegister()">
Создать аккаунт
</button>


</div>





<div id="register-form" style="display:none">


<h2>Регистрация</h2>



<input
id="reg-name"
placeholder="Имя"
>



<input
id="reg-email"
placeholder="Email"
>



<input
id="reg-password"
type="password"
placeholder="Пароль"
>



<button onclick="register()">
Регистрация
</button>



<br><br>


<button onclick="showLogin()">
Назад
</button>


</div>



</div>







<!-- =====================
CHAT
===================== -->


<div id="chat-app" style="display:none">



<div class="sidebar">


<div class="logo">

🚀 NovaChat

</div>



<div class="profile">


<div class="avatar">

👤

</div>


<div>

<h3 id="current-user">

User

</h3>

<span>
Online
</span>


</div>


</div>



<div id="users-list">


</div>



</div>









<div class="chat">



<div class="chat-header">


<h2>
Общий чат
</h2>


<span>
🟢 online
</span>



</div>







<div 
id="messages"
class="messages">

</div>









<div class="input-box">


<input

id="message-text"

placeholder="Введите сообщение..."

onkeydown="
if(event.key==='Enter') sendMessage()
"

>


<button onclick="sendMessage()">

➤

</button>



</div>



</div>





</div>







<script src="app.js"></script>


</body>

</html>
