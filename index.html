<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat Pro</title>


<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>


</head>


<body>


<div class="app">


<!-- LOGIN -->

<div class="auth" id="auth">


<div class="logo">

🚀 NovaChat

</div>


<div class="card">


<h2 id="authTitle">
Вход
</h2>


<input 
id="username"
placeholder="Имя пользователя"
>


<input 
id="email"
placeholder="Email"
>


<input 
id="password"
type="password"
placeholder="Пароль"
>


<button onclick="login()">

Войти

</button>



<button 
class="secondary"
onclick="register()">

Создать аккаунт

</button>



</div>


</div>





<!-- MAIN CHAT -->


<div class="chat" id="chat">


<header>


<div>


<h2>
🚀 NovaChat
</h2>


<span id="online">

offline

</span>


</div>



<button onclick="logout()">

Выйти

</button>


</header>






<div class="content">



<!-- USERS -->


<aside>


<h3>
Пользователи
</h3>


<div id="users">

</div>


</aside>






<!-- MESSAGES -->


<section>


<div 
id="messages"
class="messages">

</div>




<div class="typing" id="typing">

</div>





<div class="send">


<input

id="message"

placeholder="Написать сообщение..."

oninput="typing()"

>


<button onclick="sendMessage()">

➤

</button>


</div>


</section>






<!-- PROFILE -->


<div class="profile">


<h3>
Профиль
</h3>


<div id="profile">

</div>


</div>



</div>


</div>



</div>




<script src="app.js"></script>


</body>

</html>
